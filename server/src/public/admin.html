<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>管理UI - 汎用Kintone連携サーバ</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 2rem; }
    form { border: 1px solid #ddd; padding: 1rem; margin-bottom: 2rem; }
    input, select, textarea { width: 100%; padding: .5rem; margin: .25rem 0; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .muted { color: #666; font-size: .9rem; }
    .ok { color: #0a0; }
    .err { color: #a00; }
    table { width:100%; border-collapse: collapse; }
    th, td { border: 1px solid #ddd; padding: .5rem; }
    .tenant-list { margin-top: 1rem; display: grid; gap: 1rem; }
    .tenant-card { border: 1px solid #ddd; border-radius: .5rem; padding: 1rem; background: #fafafa; }
    .tenant-card h3 { margin: 0 0 .5rem; font-size: 1.1rem; }
    .tenant-card small { color: #666; font-weight: 400; margin-left: .5rem; }
    .tenant-card table { margin-top: .5rem; }
    .tenant-card a { color: #0a53c1; }
    .danger { background: #fff3f3; border: 1px solid #d66; color: #900; border-radius: .35rem; padding: .35rem .55rem; cursor: pointer; }
  </style>
</head>
<body>
  <h1>管理UI</h1>
  <p class="muted">CUI不要でテナント/アプリ/スキーマ/トークンを登録できます。API呼び出しはこのページから実行されます。</p>

  <section>
    <h2>初期セットアップ（新規向け）</h2>
    <form id="bootstrapForm">
      <label>初期テナント名（任意）</label>
      <input id="bootstrapTenantName" name="tenant_name" placeholder="default" />
      <label>初期管理者ID</label>
      <input id="bootstrapAdminUser" name="admin_username" placeholder="admin" required />
      <label>初期管理者パスワード</label>
      <input id="bootstrapAdminPass" name="admin_password" type="password" placeholder="12文字以上" required />
      <label>初期管理者の表示名（任意）</label>
      <input id="bootstrapAdminDisplay" name="admin_display_name" placeholder="組織管理者" />
      <button type="submit">管理トークン＋テナントIDを自動生成</button>
      <div id="bootstrapMsg" class="muted"></div>
    </form>
  </section>

  <section>
    <h2>管理者ログイン</h2>
    <form id="loginForm">
      <label>管理者ID</label>
      <input name="username" placeholder="admin" autocomplete="username" required />
      <label>パスワード</label>
      <input name="password" type="password" autocomplete="current-password" required />
      <button type="submit">ログイン</button>
    </form>
    <button type="button" id="logoutButton">ログアウト</button>
    <div id="loginStatus" class="muted"></div>
    <details>
      <summary>レガシートークン保存（旧互換機能）</summary>
      <form id="authForm">
        <label>管理トークン（ADMIN_TOKEN）</label>
        <input id="adminToken" name="admin_token" placeholder="adm_xxx..." autocomplete="off" />
        <button type="submit">保存</button>
        <div id="authMsg" class="muted"></div>
      </form>
    </details>
  </section>

  <section>
    <h2>管理者アカウント</h2>
    <form id="adminUserForm">
      <label>新規管理者ID</label>
      <input name="username" placeholder="example-admin" required />
      <label>表示名（任意）</label>
      <input name="display_name" placeholder="表示用ラベル" />
      <label>初期パスワード</label>
      <input name="password" type="password" placeholder="12文字以上" required />
      <button type="submit">追加</button>
      <div id="adminUserMsg" class="muted"></div>
    </form>
    <button type="button" id="reloadAdminUsers">管理者一覧を再読み込み</button>
    <div id="adminUsersTable" class="muted"></div>
  </section>

  <section>
    <h2>テナント作成</h2>
    <form id="tenantForm">
      <label>テナント名</label>
      <input name="name" required />
      <button type="submit">作成</button>
      <div id="tenantMsg" class="muted"></div>
    </form>
  </section>

  <section>
    <h2>登録済みテナント一覧</h2>
    <button type="button" id="loadTenants">一覧取得</button>
    <div id="tenantsTable" class="tenant-list muted"></div>
  </section>

  <section>
    <h2>アプリ登録</h2>
    <form id="appForm">
      <label>テナントID</label>
      <input name="tenant" required />
      <label>Kintoneドメイン</label>
      <input name="kintone_domain" required placeholder="your-subdomain.kintone.com" />
      <label>KintoneアプリID（または内部コード）</label>
      <input name="app_code" required placeholder="1234 もしくは app_001" />
      <div class="row">
        <div>
          <label>認証方式</label>
          <select name="auth_type">
            <option value="api_token">APIトークン</option>
            <option value="oauth">OAuth</option>
          </select>
        </div>
        <div>
          <label>APIトークン（暗号化保存）</label>
          <input name="api_token" placeholder="必要に応じて入力" />
        </div>
      </div>
      <button type="submit">登録</button>
      <div id="appMsg" class="muted"></div>
    </form>
  </section>

  <section>
    <h2>スキーマ登録</h2>
    <form id="schemaForm">
      <label>テナントID</label>
      <input name="tenant" required />
      <label>アプリID（登録応答の app_id）</label>
      <input name="app_id" required />
      <label>タイプ</label>
      <select name="type">
        <option value="form">form</option>
        <option value="view">view</option>
      </select>
      <label>JSON</label>
      <textarea name="json" rows="6" placeholder='{"version":1, ...}' required></textarea>
      <button type="submit">登録</button>
      <div id="schemaMsg" class="muted"></div>
    </form>
  </section>

  <section>
    <h2>トークン発行</h2>
    <form id="tokenForm">
      <label>テナントID</label>
      <input name="tenant" required />
      <label>アプリID</label>
      <input name="app" required />
      <div class="row">
        <div>
          <label>スコープ</label>
          <select name="scope">
            <option value="view">view</option>
            <option value="edit">edit</option>
          </select>
        </div>
        <div>
          <label>期限（分）</label>
          <input name="expiry_minutes" type="number" min="1" max="1440" value="30" required />
        </div>
      </div>
      <label>レコード参照（任意）</label>
      <input name="record_ref" />
      <button type="submit">発行</button>
      <div id="tokenMsg" class="muted"></div>
    </form>
  </section>

  <section>
    <h2>登録済みアプリ一覧（全テナント）</h2>
    <button type="button" id="loadAllApps">全件読み込み</button>
    <div id="allAppsTable"></div>
  </section>

  <section>
    <h2>登録済みアプリ（簡易一覧）</h2>
    <div class="row">
      <input id="appsTenant" placeholder="テナントID" />
      <button type="button" id="loadApps">読み込み</button>
    </div>
    <div id="appsTable"></div>
  </section>

<script src="/admin/ui/admin.js"></script>
</body>
</html>
